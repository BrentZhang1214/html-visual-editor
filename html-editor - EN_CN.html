<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 可视化编辑器 | HTML Visual Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400&family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Primary Brand */
            --color-forest-black: #001e2b;
            --color-mongodb-green: #00ed64;
            --color-dark-green: #00684a;
            
            /* Interactive */
            --color-action-blue: #006cfa;
            --color-hover-blue: #3860be;
            --color-teal-active: #1eaedb;
            
            /* Neutral Scale */
            --color-deep-teal: #1c2d38;
            --color-teal-gray: #3d4f58;
            --color-cool-gray: #5c6c75;
            --color-silver-teal: #b8c4c2;
            --color-light-input: #e8edeb;
            
            /* Base Colors */
            --color-white: #ffffff;
            --color-black: #000000;
            
            /* Shadows */
            --shadow-forest: rgba(0, 30, 43, 0.12) 0px 26px 44px, rgba(0, 0, 0, 0.13) 0px 7px 13px;
            --shadow-standard: rgba(0, 0, 0, 0.15) 0px 3px 9px;
            --shadow-subtle: rgba(0, 0, 0, 0.1) 0px 2px 4px;
            
            /* Fonts */
            --font-display: 'Crimson Pro', 'MongoDB Value Serif Fallback', serif;
            --font-body: 'Inter', 'Euclid Circular A Fallback', system-ui, sans-serif;
            --font-code: 'JetBrains Mono', 'Source Code Pro Fallback', monospace;
            
            /* Radii */
            --radius-input: 4px;
            --radius-standard: 8px;
            --radius-card: 16px;
            --radius-large: 24px;
            --radius-image: 30px;
            --radius-pill: 100px;
            --radius-full: 9999px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-forest-black);
            color: var(--color-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.33;
        }
        
        /* Header - Dark Mode */
        .header {
            background: var(--color-forest-black);
            border-bottom: 1px solid var(--color-teal-gray);
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 400;
            color: var(--color-white);
            line-height: 1.33;
        }
        
        .header h1 .accent {
            color: var(--color-mongodb-green);
            border-bottom: 2px solid var(--color-mongodb-green);
            padding-bottom: 2px;
        }
        
        .header-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .lang-switch {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .lang-switch button {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.15s ease;
            background: transparent;
            color: var(--color-light-input);
            border: 1px solid var(--color-teal-gray);
        }
        
        .lang-switch button:hover {
            background: var(--color-teal-active);
            color: var(--color-white);
            border-color: var(--color-teal-active);
        }
        
        .lang-switch button.active {
            background: var(--color-mongodb-green);
            color: var(--color-black);
            border-color: var(--color-mongodb-green);
        }
        
        .file-actions {
            display: flex;
            gap: 16px;
        }
        
        .file-actions button {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.135px;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .btn-primary {
            background: var(--color-dark-green);
            color: var(--color-black);
            border: 1px solid var(--color-dark-green);
            box-shadow: rgba(0,0,0,0.06) 0px 1px 6px;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
        }
        
        .btn-primary:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: var(--color-deep-teal);
            color: var(--color-cool-gray);
            border: 1px solid var(--color-teal-gray);
        }
        
        .btn-secondary:hover {
            background: var(--color-teal-active);
            color: var(--color-white);
        }
        
        /* Toolbar - Dark Mode */
        .toolbar {
            background: var(--color-deep-teal);
            border-bottom: 1px solid var(--color-teal-gray);
            padding: 16px 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        
        .toolbar button {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            background: transparent;
            color: var(--color-light-input);
            border: 1px solid var(--color-teal-gray);
            padding: 8px 16px;
            border-radius: var(--radius-standard);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .toolbar button:hover {
            background: var(--color-teal-active);
            color: var(--color-white);
            border-color: var(--color-teal-active);
        }
        
        .toolbar select {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            padding: 8px 16px;
            border: 1px solid var(--color-teal-gray);
            border-radius: var(--radius-standard);
            background: var(--color-deep-teal);
            color: var(--color-light-input);
            cursor: pointer;
        }
        
        .toolbar select:focus {
            outline: none;
            border-color: var(--color-mongodb-green);
        }
        
        .separator {
            width: 1px;
            height: 32px;
            background: var(--color-teal-gray);
            margin: 0 8px;
        }
        
        /* Color Pickers */
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .color-picker-group label {
            font-family: var(--font-code);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-light-input);
        }
        
        .color-picker-group input[type="color"] {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid var(--color-teal-gray);
            border-radius: var(--radius-input);
            cursor: pointer;
            background: var(--color-deep-teal);
        }
        
        .color-picker-group button {
            font-size: 14px;
            padding: 6px 12px;
        }
        
        /* Main Container - Light Mode */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 24px;
            background: var(--color-forest-black);
        }
        
        .editor-wrapper {
            flex: 1;
            background: var(--color-white);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-forest);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Tabs */
        .tab-bar {
            display: flex;
            background: var(--color-white);
            border-bottom: 1px solid var(--color-silver-teal);
            padding: 0 24px;
        }
        
        .tab {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.16px;
            padding: 16px 24px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--color-black);
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
        }
        
        .tab:hover {
            color: var(--color-action-blue);
        }
        
        .tab.active {
            border-bottom-color: var(--color-mongodb-green);
        }
        
        /* Editor */
        .editor-container {
            flex: 1;
            position: relative;
            background: var(--color-white);
        }
        
        #visual-editor-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #html-editor {
            width: 100%;
            height: 100%;
            padding: 24px;
            font-family: var(--font-code);
            font-size: 16px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            display: none;
            background: var(--color-white);
            color: var(--color-black);
        }
        
        /* Status Bar */
        .status-bar {
            background: var(--color-white);
            border-top: 1px solid var(--color-silver-teal);
            padding: 12px 24px;
            font-family: var(--font-code);
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-black);
            display: flex;
            justify-content: space-between;
        }
        
        /* File Input */
        #file-input {
            display: none;
        }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 30, 43, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--color-deep-teal);
            padding: 32px;
            border-radius: var(--radius-card);
            border: 1px solid var(--color-teal-gray);
            box-shadow: var(--shadow-forest);
            width: 480px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 400;
            color: var(--color-white);
            margin-bottom: 24px;
        }
        
        .modal-content input {
            width: 100%;
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            padding: 12px 16px;
            border: 1px solid var(--color-teal-gray);
            border-radius: var(--radius-input);
            outline: none;
            margin-bottom: 24px;
            background: var(--color-forest-black);
            color: var(--color-light-input);
            transition: border-color 0.15s ease;
        }
        
        .modal-content input:focus {
            border-color: var(--color-mongodb-green);
        }
        
        .modal-content input::placeholder {
            color: var(--color-cool-gray);
        }
        
        .modal-content .buttons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }
        
        .modal-content button {
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .modal-content button.cancel {
            background: var(--color-forest-black);
            color: var(--color-cool-gray);
            border: 1px solid var(--color-teal-gray);
        }
        
        .modal-content button.cancel:hover {
            background: var(--color-deep-teal);
        }
        
        .modal-content button.confirm {
            background: var(--color-dark-green);
            color: var(--color-black);
            border: 1px solid var(--color-dark-green);
        }
        
        .modal-content button.confirm:hover {
            transform: scale(1.05);
        }
        
        /* Focus Styles */
        button:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--color-mongodb-green);
            outline-offset: 2px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .toolbar {
                padding: 12px 16px;
                gap: 8px;
            }
            
            .main-container {
                padding: 16px;
            }
            
            .editor-wrapper {
                border-radius: var(--radius-card);
            }
            
            .header-right {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HTML <span class="accent" data-i18n="editor">可视化编辑器</span></h1>
        <div class="header-right">
            <div class="lang-switch">
                <button onclick="switchLang('zh')" class="active" id="lang-zh">中文</button>
                <button onclick="switchLang('en')" id="lang-en">English</button>
            </div>
            <div class="file-actions">
                <button class="btn-secondary" onclick="newFile()" data-i18n="new">新建</button>
                <button class="btn-secondary" onclick="document.getElementById('file-input').click()" data-i18n="open">打开</button>
                <button class="btn-primary" onclick="saveFile()" data-i18n="save">保存</button>
                <button class="btn-secondary" onclick="saveAsFile()" data-i18n="saveAs">另存为</button>
            </div>
        </div>
    </div>
    
    <input type="file" id="file-input" accept=".html,.htm" onchange="loadFile(event)">
    
    <div class="toolbar">
        <button onclick="execCmd('bold')" title="粗体 (Ctrl+B) / Bold (Ctrl+B)"><strong>B</strong></button>
        <button onclick="execCmd('italic')" title="斜体 (Ctrl+I) / Italic (Ctrl+I)"><em>I</em></button>
        <button onclick="execCmd('underline')" title="下划线 (Ctrl+U) / Underline (Ctrl+U)"><u>U</u></button>
        <button onclick="execCmd('strikeThrough')" title="删除线 / Strikethrough"><s>S</s></button>
        
        <div class="separator"></div>
        
        <select onchange="execCmdWithArg('formatBlock', this.value); this.value='';" id="heading-select">
            <option value="" data-i18n="heading">标题</option>
            <option value="h1" data-i18n="heading1">标题 1</option>
            <option value="h2" data-i18n="heading2">标题 2</option>
            <option value="h3" data-i18n="heading3">标题 3</option>
            <option value="h4" data-i18n="heading4">标题 4</option>
            <option value="p" data-i18n="paragraph">段落</option>
        </select>
        
        <button onclick="execCmd('insertUnorderedList')" title="无序列表 / Unordered List" data-i18n="unorderedList">• 列表</button>
        <button onclick="execCmd('insertOrderedList')" title="有序列表 / Ordered List" data-i18n="orderedList">1. 列表</button>
        
        <div class="separator"></div>
        
        <button onclick="execCmd('justifyLeft')" title="左对齐 / Align Left" data-i18n="alignLeft">左对齐</button>
        <button onclick="execCmd('justifyCenter')" title="居中 / Center" data-i18n="alignCenter">居中</button>
        <button onclick="execCmd('justifyRight')" title="右对齐 / Align Right" data-i18n="alignRight">右对齐</button>
        
        <div class="separator"></div>
        
        <button onclick="insertLink()" title="插入链接 / Insert Link" data-i18n="link">链接</button>
        <button onclick="insertImage()" title="插入图片 / Insert Image" data-i18n="image">图片</button>
        
        <div class="separator"></div>
        
        <div class="color-picker-group">
            <label data-i18n="textColor">文字色</label>
            <input type="color" id="text-color" onchange="execCmdWithArg('foreColor', this.value)" title="文字颜色 / Text Color">
            <button onclick="execCmd('removeFormat')" title="清除文字颜色 / Clear Text Color" data-i18n="clear">清除</button>
        </div>
        
        <div class="color-picker-group">
            <label data-i18n="bgColor">背景色</label>
            <input type="color" id="bg-color" onchange="execCmdWithArg('hiliteColor', this.value)" title="背景颜色 / Background Color">
            <button onclick="execCmdWithArg('hiliteColor', 'transparent')" title="清除背景颜色 / Clear Background Color" data-i18n="clear">清除</button>
        </div>
        
        <div class="separator"></div>
        
        <button onclick="execCmd('undo')" title="撤销 (Ctrl+Z) / Undo (Ctrl+Z)" data-i18n="undo">撤销</button>
        <button onclick="execCmd('redo')" title="重做 (Ctrl+Y) / Redo (Ctrl+Y)" data-i18n="redo">重做</button>
        <button onclick="execCmd('removeFormat')" title="清除格式 / Clear Format" data-i18n="clearFormat">清除格式</button>
    </div>
    
    <div class="main-container">
        <div class="editor-wrapper">
            <div class="tab-bar">
                <button class="tab active" onclick="switchTab('visual')" data-i18n="visualEdit">可视化编辑</button>
                <button class="tab" onclick="switchTab('html')" data-i18n="htmlSource">HTML 源码</button>
            </div>
            
            <div class="editor-container">
                <iframe id="visual-editor-iframe"></iframe>
                <textarea id="html-editor" data-i18n-placeholder="htmlPlaceholder"></textarea>
            </div>
            
            <div class="status-bar">
                <span id="status" data-i18n="ready">就绪</span>
                <span id="file-name" data-i18n="unsaved">未保存</span>
            </div>
        </div>
    </div>
    
    <div id="link-modal" class="modal">
        <div class="modal-content">
            <h3 data-i18n="insertLink">插入链接</h3>
            <input type="text" id="link-url" data-i18n-placeholder="linkPlaceholder">
            <div class="buttons">
                <button class="cancel" onclick="closeModal('link-modal')" data-i18n="cancel">取消</button>
                <button class="confirm" onclick="confirmLink()" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>
    
    <div id="image-modal" class="modal">
        <div class="modal-content">
            <h3 data-i18n="insertImage">插入图片</h3>
            <input type="text" id="image-url" data-i18n-placeholder="imagePlaceholder">
            <div class="buttons">
                <button class="cancel" onclick="closeModal('image-modal')" data-i18n="cancel">取消</button>
                <button class="confirm" onclick="confirmImage()" data-i18n="confirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        // Internationalization
        const i18n = {
            zh: {
                editor: '可视化编辑器',
                new: '新建',
                open: '打开',
                save: '保存',
                saveAs: '另存为',
                heading: '标题',
                heading1: '标题 1',
                heading2: '标题 2',
                heading3: '标题 3',
                heading4: '标题 4',
                paragraph: '段落',
                unorderedList: '• 列表',
                orderedList: '1. 列表',
                alignLeft: '左对齐',
                alignCenter: '居中',
                alignRight: '右对齐',
                link: '链接',
                image: '图片',
                textColor: '文字色',
                bgColor: '背景色',
                clear: '清除',
                undo: '撤销',
                redo: '重做',
                clearFormat: '清除格式',
                visualEdit: '可视化编辑',
                htmlSource: 'HTML 源码',
                htmlPlaceholder: 'HTML 源码将在这里显示...',
                ready: '就绪',
                unsaved: '未保存',
                insertLink: '插入链接',
                linkPlaceholder: '输入链接地址 (例如: https://example.com)',
                insertImage: '插入图片',
                imagePlaceholder: '输入图片地址 (例如: https://example.com/image.jpg)',
                cancel: '取消',
                confirm: '确定',
                confirmNew: '确定要新建文件吗？未保存的内容将丢失。',
                fileNamePrompt: '请输入文件名:',
                welcomeTitle: '欢迎使用 HTML 可视化编辑器',
                welcomeIntro: '这是一个简单的 HTML 编辑器，你可以：',
                welcomeItem1: '直接在此处输入和编辑内容',
                welcomeItem2: '使用上方工具栏设置文字格式',
                welcomeItem3: '插入链接、图片等元素',
                welcomeItem4: '切换到"HTML 源码"标签查看和编辑 HTML 代码',
                welcomeItem5: '保存为 .html 文件',
                welcomeEnd: '开始编辑你的内容吧！',
                created: '已新建',
                loaded: '已加载: ',
                saved: '已保存: '
            },
            en: {
                editor: 'Visual Editor',
                new: 'New',
                open: 'Open',
                save: 'Save',
                saveAs: 'Save As',
                heading: 'Heading',
                heading1: 'Heading 1',
                heading2: 'Heading 2',
                heading3: 'Heading 3',
                heading4: 'Heading 4',
                paragraph: 'Paragraph',
                unorderedList: '• List',
                orderedList: '1. List',
                alignLeft: 'Left',
                alignCenter: 'Center',
                alignRight: 'Right',
                link: 'Link',
                image: 'Image',
                textColor: 'TEXT',
                bgColor: 'BG',
                clear: 'Clear',
                undo: 'Undo',
                redo: 'Redo',
                clearFormat: 'Clear',
                visualEdit: 'Visual Editor',
                htmlSource: 'HTML Source',
                htmlPlaceholder: 'HTML source code will be displayed here...',
                ready: 'Ready',
                unsaved: 'Unsaved',
                insertLink: 'Insert Link',
                linkPlaceholder: 'Enter URL (e.g., https://example.com)',
                insertImage: 'Insert Image',
                imagePlaceholder: 'Enter image URL (e.g., https://example.com/image.jpg)',
                cancel: 'Cancel',
                confirm: 'OK',
                confirmNew: 'Create a new file? Unsaved changes will be lost.',
                fileNamePrompt: 'Enter file name:',
                welcomeTitle: 'Welcome to HTML Visual Editor',
                welcomeIntro: 'This is a simple HTML editor. You can:',
                welcomeItem1: 'Type and edit content directly',
                welcomeItem2: 'Format text using the toolbar above',
                welcomeItem3: 'Insert links, images, and other elements',
                welcomeItem4: 'Switch to "HTML Source" tab to view and edit HTML code',
                welcomeItem5: 'Save as .html file',
                welcomeEnd: 'Start editing your content!',
                created: 'Created',
                loaded: 'Loaded: ',
                saved: 'Saved: '
            }
        };
        
        let currentLang = 'zh';
        
        function switchLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            
            // Update language buttons
            document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            
            // Update all text content
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });
            
            // Update all placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[lang][key]) {
                    el.placeholder = i18n[lang][key];
                }
            });
            
            // Update select options
            const headingSelect = document.getElementById('heading-select');
            headingSelect.options[0].text = i18n[lang].heading;
            headingSelect.options[1].text = i18n[lang].heading1;
            headingSelect.options[2].text = i18n[lang].heading2;
            headingSelect.options[3].text = i18n[lang].heading3;
            headingSelect.options[4].text = i18n[lang].heading4;
            headingSelect.options[5].text = i18n[lang].paragraph;
            
            // Re-initialize iframe with new language
            initIframe();
        }
        
        let currentFileName = i18n.zh.unsaved;
        let savedContent = '';
        let originalHTML = '';
        
        const iframe = document.getElementById('visual-editor-iframe');
        const htmlEditor = document.getElementById('html-editor');
        
        // 初始化 iframe
        function initIframe() {
            const t = i18n[currentLang];
            const defaultContent = `
                <h1>${t.welcomeTitle}</h1>
                <p>${t.welcomeIntro}</p>
                <ul>
                    <li>${t.welcomeItem1}</li>
                    <li>${t.welcomeItem2}</li>
                    <li>${t.welcomeItem3}</li>
                    <li>${t.welcomeItem4}</li>
                    <li>${t.welcomeItem5}</li>
                </ul>
                <p>${t.welcomeEnd}</p>
            `;
            
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body {
                            font-family: 'Inter', sans-serif;
                            padding: 32px;
                            line-height: 1.6;
                            color: #000000;
                            font-weight: 300;
                        }
                        h1, h2, h3, h4 {
                            font-family: 'Crimson Pro', serif;
                            font-weight: 400;
                        }
                    </style>
                </head>
                <body contenteditable="true">
                    ${defaultContent}
                </body>
                </html>
            `);
            iframeDoc.close();
            
            originalHTML = iframeDoc.body.innerHTML;
            htmlEditor.value = defaultContent;
        }
        
        // 执行编辑命令
        function execCmd(command) {
            iframe.contentDocument.execCommand(command, false, null);
            iframe.contentDocument.body.focus();
        }
        
        // 执行带参数的编辑命令
        function execCmdWithArg(command, arg) {
            iframe.contentDocument.execCommand(command, false, arg);
            iframe.contentDocument.body.focus();
        }
        
        // 切换标签
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'visual') {
                tabs[0].classList.add('active');
                iframe.style.display = 'block';
                htmlEditor.style.display = 'none';
                const htmlContent = htmlEditor.value;
                const bodyMatch = htmlContent.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                if (bodyMatch) {
                    iframe.contentDocument.body.innerHTML = bodyMatch[1];
                } else {
                    iframe.contentDocument.body.innerHTML = htmlContent;
                }
            } else {
                tabs[1].classList.add('active');
                iframe.style.display = 'none';
                htmlEditor.style.display = 'block';
                const bodyContent = iframe.contentDocument.body.innerHTML;
                htmlEditor.value = generateHTML(bodyContent);
            }
        }
        
        // 新建文件
        function newFile() {
            const t = i18n[currentLang];
            if (confirm(t.confirmNew)) {
                initIframe();
                currentFileName = t.unsaved;
                savedContent = '';
                originalHTML = '';
                updateStatus(t.created);
                document.getElementById('file-name').textContent = t.unsaved;
            }
        }
        
        // 加载文件
        function loadFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    originalHTML = content;
                    
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(content);
                    iframeDoc.close();
                    
                    iframeDoc.body.contentEditable = 'true';
                    htmlEditor.value = content;
                    
                    currentFileName = file.name;
                    savedContent = iframeDoc.body.innerHTML;
                    const t = i18n[currentLang];
                    updateStatus(t.loaded + file.name);
                    document.getElementById('file-name').textContent = file.name;
                };
                reader.readAsText(file);
            }
        }
        
        // 保存文件
        function saveFile() {
            const bodyContent = iframe.contentDocument.body.innerHTML;
            const htmlContent = generateHTML(bodyContent);
            const t = i18n[currentLang];
            
            if (currentFileName === t.unsaved) {
                saveAsFile();
            } else {
                downloadFile(htmlContent, currentFileName);
                savedContent = bodyContent;
                updateStatus(t.saved + currentFileName);
            }
        }
        
        // 另存为
        function saveAsFile() {
            const t = i18n[currentLang];
            const fileName = prompt(t.fileNamePrompt, 'my-document.html');
            if (fileName) {
                const bodyContent = iframe.contentDocument.body.innerHTML;
                const htmlContent = generateHTML(bodyContent);
                downloadFile(htmlContent, fileName);
                currentFileName = fileName;
                savedContent = bodyContent;
                document.getElementById('file-name').textContent = fileName;
                updateStatus(t.saved + fileName);
            }
        }
        
        // 生成完整 HTML
        function generateHTML(bodyContent) {
            if (originalHTML) {
                const headMatch = originalHTML.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
                if (headMatch) {
                    return `<!DOCTYPE html>
<html>
<head>
${headMatch[1]}
</head>
<body>
${bodyContent}
</body>
</html>`;
                }
            }
            
            return `<!DOCTYPE html>
<html lang="${currentLang === 'zh' ? 'zh-CN' : 'en'}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${currentFileName.replace('.html', '')}</title>
</head>
<body>
${bodyContent}
</body>
</html>`;
        }
        
        // 下载文件
        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 插入链接
        function insertLink() {
            document.getElementById('link-modal').classList.add('active');
            document.getElementById('link-url').focus();
        }
        
        function confirmLink() {
            const url = document.getElementById('link-url').value;
            if (url) {
                execCmdWithArg('createLink', url);
            }
            closeModal('link-modal');
            document.getElementById('link-url').value = '';
        }
        
        function insertImage() {
            document.getElementById('image-modal').classList.add('active');
            document.getElementById('image-url').focus();
        }
        
        function confirmImage() {
            const url = document.getElementById('image-url').value;
            if (url) {
                execCmdWithArg('insertImage', url);
            }
            closeModal('image-modal');
            document.getElementById('image-url').value = '';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
            setTimeout(() => {
                document.getElementById('status').textContent = i18n[currentLang].ready;
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    saveFile();
                } else if (e.key === 'n') {
                    e.preventDefault();
                    newFile();
                } else if (e.key === 'o') {
                    e.preventDefault();
                    document.getElementById('file-input').click();
                }
            }
        });
        
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
        
        document.getElementById('link-url').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmLink();
        });
        
        document.getElementById('image-url').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmImage();
        });
        
        window.onload = initIframe;
    </script>
</body>
</html>
