<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 可视化编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TE Brand Colors */
            --te-blue: #0066a1;
            --te-blue-light: #0088cc;
            --te-orange: #e98300;
            --te-orange-hover: #ff9500;
            
            /* Dark Surfaces */
            --bg-dark: #1a1f26;
            --bg-card: #242a33;
            --bg-darkest: #0f1216;
            
            /* Text & UI */
            --text-primary: #f0f0f0;
            --text-secondary: #a0a8b0;
            --border: #3a404a;
            --meta-gray: #889098;
            
            /* Base */
            --color-white: #ffffff;
            
            /* Font */
            --font: 'Inter', 'Avenir LT W01 85 Heavy', 'Avenir', Helvetica, Arial, sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font);
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header - TE Dark Style */
        .header {
            background: var(--bg-darkest);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-primary);
            line-height: 1.3;
        }
        
        .header h1 .accent {
            color: var(--te-orange);
        }
        
        .file-actions {
            display: flex;
            gap: 12px;
        }
        
        .file-actions button {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }
        
        .btn-primary {
            background: var(--te-orange);
            color: var(--color-white);
        }
        
        .btn-primary:hover {
            background: var(--te-orange-hover);
        }
        
        .btn-secondary {
            background: var(--te-blue-light);
            color: var(--color-white);
        }
        
        .btn-secondary:hover {
            background: var(--te-blue);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .btn-outline:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }
        
        /* Toolbar - TE Card Style */
        .toolbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        
        .toolbar button {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 900;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 2px;
            cursor: pointer;
            transition: color 0.15s;
        }
        
        .toolbar button:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }
        
        .toolbar select {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 2px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .toolbar select:focus {
            outline: none;
            border-color: var(--te-blue-light);
        }
        
        .separator {
            width: 1px;
            height: 32px;
            background: var(--border);
            margin: 0 8px;
        }
        
        /* Color Pickers */
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .color-picker-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--meta-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .color-picker-group input[type="color"] {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            background: var(--bg-card);
        }
        
        .color-picker-group button {
            font-size: 14px;
            font-weight: 900;
            padding: 6px 12px;
        }
        
        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 24px 32px;
            background: var(--bg-dark);
        }
        
        .editor-wrapper {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Tabs */
        .tab-bar {
            display: flex;
            background: var(--bg-darkest);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        
        .tab {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            padding: 16px 24px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: color 0.15s;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--te-orange);
        }
        
        /* Editor */
        .editor-container {
            flex: 1;
            position: relative;
            background: var(--bg-card);
        }
        
        #visual-editor-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #html-editor {
            width: 100%;
            height: 100%;
            padding: 24px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            display: none;
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        /* Status Bar */
        .status-bar {
            background: var(--bg-darkest);
            border-top: 1px solid var(--border);
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 700;
            color: var(--meta-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        
        /* File Input */
        #file-input {
            display: none;
        }
        
        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            padding: 32px;
            border: 1px solid var(--border);
            width: 480px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 24px;
            line-height: 1.3;
        }
        
        .modal-content input {
            width: 100%;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 400;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 2px;
            outline: none;
            margin-bottom: 24px;
            background: var(--bg-dark);
            color: var(--text-primary);
        }
        
        .modal-content input:focus {
            border-color: var(--te-blue-light);
            box-shadow: 0 0 0 2px rgba(0, 136, 204, 0.25);
        }
        
        .modal-content input::placeholder {
            color: var(--meta-gray);
        }
        
        .modal-content .buttons {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }
        
        .modal-content button {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 2px;
            cursor: pointer;
            border: none;
        }
        
        .modal-content button.cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .modal-content button.cancel:hover {
            color: var(--text-primary);
        }
        
        .modal-content button.confirm {
            background: var(--te-orange);
            color: var(--color-white);
        }
        
        .modal-content button.confirm:hover {
            background: var(--te-orange-hover);
        }
        
        /* Focus Styles */
        button:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--te-blue-light);
            outline-offset: 2px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .toolbar {
                padding: 12px 16px;
                gap: 8px;
            }
            
            .main-container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HTML <span class="accent">可视化编辑器</span></h1>
        <div class="file-actions">
            <button class="btn-outline" onclick="newFile()">新建</button>
            <button class="btn-outline" onclick="document.getElementById('file-input').click()">打开</button>
            <button class="btn-primary" onclick="saveFile()">保存</button>
            <button class="btn-secondary" onclick="saveAsFile()">另存为</button>
        </div>
    </div>
    
    <input type="file" id="file-input" accept=".html,.htm" onchange="loadFile(event)">
    
    <div class="toolbar">
        <button onclick="execCmd('bold')" title="粗体 (Ctrl+B)"><strong>B</strong></button>
        <button onclick="execCmd('italic')" title="斜体 (Ctrl+I)"><em>I</em></button>
        <button onclick="execCmd('underline')" title="下划线 (Ctrl+U)"><u>U</u></button>
        <button onclick="execCmd('strikeThrough')" title="删除线"><s>S</s></button>
        
        <div class="separator"></div>
        
        <select onchange="execCmdWithArg('formatBlock', this.value); this.value='';">
            <option value="">标题</option>
            <option value="h1">标题 1</option>
            <option value="h2">标题 2</option>
            <option value="h3">标题 3</option>
            <option value="h4">标题 4</option>
            <option value="p">段落</option>
        </select>
        
        <button onclick="execCmd('insertUnorderedList')" title="无序列表">• 列表</button>
        <button onclick="execCmd('insertOrderedList')" title="有序列表">1. 列表</button>
        
        <div class="separator"></div>
        
        <button onclick="execCmd('justifyLeft')" title="左对齐">左对齐</button>
        <button onclick="execCmd('justifyCenter')" title="居中">居中</button>
        <button onclick="execCmd('justifyRight')" title="右对齐">右对齐</button>
        
        <div class="separator"></div>
        
        <button onclick="insertLink()" title="插入链接">链接</button>
        <button onclick="insertImage()" title="插入图片">图片</button>
        
        <div class="separator"></div>
        
        <div class="color-picker-group">
            <label>文字色</label>
            <input type="color" id="text-color" onchange="execCmdWithArg('foreColor', this.value)" title="文字颜色">
            <button onclick="execCmd('removeFormat')" title="清除文字颜色">清除</button>
        </div>
        
        <div class="color-picker-group">
            <label>背景色</label>
            <input type="color" id="bg-color" onchange="execCmdWithArg('hiliteColor', this.value)" title="背景颜色">
            <button onclick="execCmdWithArg('hiliteColor', 'transparent')" title="清除背景颜色">清除</button>
        </div>
        
        <div class="separator"></div>
        
        <button onclick="execCmd('undo')" title="撤销 (Ctrl+Z)">撤销</button>
        <button onclick="execCmd('redo')" title="重做 (Ctrl+Y)">重做</button>
        <button onclick="execCmd('removeFormat')" title="清除格式">清除格式</button>
    </div>
    
    <div class="main-container">
        <div class="editor-wrapper">
            <div class="tab-bar">
                <button class="tab active" onclick="switchTab('visual')">可视化编辑</button>
                <button class="tab" onclick="switchTab('html')">HTML 源码</button>
            </div>
            
            <div class="editor-container">
                <iframe id="visual-editor-iframe"></iframe>
                <textarea id="html-editor" placeholder="HTML 源码将在这里显示..."></textarea>
            </div>
            
            <div class="status-bar">
                <span id="status">就绪</span>
                <span id="file-name">未保存</span>
            </div>
        </div>
    </div>
    
    <div id="link-modal" class="modal">
        <div class="modal-content">
            <h3>插入链接</h3>
            <input type="text" id="link-url" placeholder="输入链接地址 (例如: https://example.com)">
            <div class="buttons">
                <button class="cancel" onclick="closeModal('link-modal')">取消</button>
                <button class="confirm" onclick="confirmLink()">确定</button>
            </div>
        </div>
    </div>
    
    <div id="image-modal" class="modal">
        <div class="modal-content">
            <h3>插入图片</h3>
            <input type="text" id="image-url" placeholder="输入图片地址 (例如: https://example.com/image.jpg)">
            <div class="buttons">
                <button class="cancel" onclick="closeModal('image-modal')">取消</button>
                <button class="confirm" onclick="confirmImage()">确定</button>
            </div>
        </div>
    </div>

    <script>
        let currentFileName = '未保存';
        let savedContent = '';
        let originalHTML = '';
        
        const iframe = document.getElementById('visual-editor-iframe');
        const htmlEditor = document.getElementById('html-editor');
        
        // 初始化 iframe
        function initIframe() {
            const defaultContent = `
                <h1>欢迎使用 HTML 可视化编辑器</h1>
                <p>这是一个简单的 HTML 编辑器，你可以：</p>
                <ul>
                    <li>直接在此处输入和编辑内容</li>
                    <li>使用上方工具栏设置文字格式</li>
                    <li>插入链接、图片等元素</li>
                    <li>切换到"HTML 源码"标签查看和编辑 HTML 代码</li>
                    <li>保存为 .html 文件</li>
                </ul>
                <p>开始编辑你的内容吧！</p>
            `;
            
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body {
                            font-family: 'Inter', sans-serif;
                            padding: 32px;
                            line-height: 1.5;
                            color: #f0f0f0;
                            background: #242a33;
                        }
                        h1, h2, h3, h4 {
                            font-weight: 900;
                            color: #f0f0f0;
                        }
                    </style>
                </head>
                <body contenteditable="true">
                    ${defaultContent}
                </body>
                </html>
            `);
            iframeDoc.close();
            
            originalHTML = iframeDoc.body.innerHTML;
            htmlEditor.value = defaultContent;
        }
        
        // 执行编辑命令
        function execCmd(command) {
            iframe.contentDocument.execCommand(command, false, null);
            iframe.contentDocument.body.focus();
        }
        
        // 执行带参数的编辑命令
        function execCmdWithArg(command, arg) {
            iframe.contentDocument.execCommand(command, false, arg);
            iframe.contentDocument.body.focus();
        }
        
        // 切换标签
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'visual') {
                tabs[0].classList.add('active');
                iframe.style.display = 'block';
                htmlEditor.style.display = 'none';
                const htmlContent = htmlEditor.value;
                const bodyMatch = htmlContent.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                if (bodyMatch) {
                    iframe.contentDocument.body.innerHTML = bodyMatch[1];
                } else {
                    iframe.contentDocument.body.innerHTML = htmlContent;
                }
            } else {
                tabs[1].classList.add('active');
                iframe.style.display = 'none';
                htmlEditor.style.display = 'block';
                const bodyContent = iframe.contentDocument.body.innerHTML;
                htmlEditor.value = generateHTML(bodyContent);
            }
        }
        
        // 新建文件
        function newFile() {
            if (confirm('确定要新建文件吗？未保存的内容将丢失。')) {
                initIframe();
                currentFileName = '未保存';
                savedContent = '';
                originalHTML = '';
                updateStatus('已新建');
                document.getElementById('file-name').textContent = '未保存';
            }
        }
        
        // 加载文件
        function loadFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    originalHTML = content;
                    
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(content);
                    iframeDoc.close();
                    
                    iframeDoc.body.contentEditable = 'true';
                    htmlEditor.value = content;
                    
                    currentFileName = file.name;
                    savedContent = iframeDoc.body.innerHTML;
                    updateStatus('已加载: ' + file.name);
                    document.getElementById('file-name').textContent = file.name;
                };
                reader.readAsText(file);
            }
        }
        
        // 保存文件
        function saveFile() {
            const bodyContent = iframe.contentDocument.body.innerHTML;
            const htmlContent = generateHTML(bodyContent);
            
            if (currentFileName === '未保存') {
                saveAsFile();
            } else {
                downloadFile(htmlContent, currentFileName);
                savedContent = bodyContent;
                updateStatus('已保存: ' + currentFileName);
            }
        }
        
        // 另存为
        function saveAsFile() {
            const fileName = prompt('请输入文件名:', 'my-document.html');
            if (fileName) {
                const bodyContent = iframe.contentDocument.body.innerHTML;
                const htmlContent = generateHTML(bodyContent);
                downloadFile(htmlContent, fileName);
                currentFileName = fileName;
                savedContent = bodyContent;
                document.getElementById('file-name').textContent = fileName;
                updateStatus('已保存: ' + fileName);
            }
        }
        
        // 生成完整 HTML
        function generateHTML(bodyContent) {
            if (originalHTML) {
                const headMatch = originalHTML.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
                if (headMatch) {
                    return `<!DOCTYPE html>
<html>
<head>
${headMatch[1]}
</head>
<body>
${bodyContent}
</body>
</html>`;
                }
            }
            
            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${currentFileName.replace('.html', '')}</title>
</head>
<body>
${bodyContent}
</body>
</html>`;
        }
        
        // 下载文件
        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 插入链接
        function insertLink() {
            document.getElementById('link-modal').classList.add('active');
            document.getElementById('link-url').focus();
        }
        
        function confirmLink() {
            const url = document.getElementById('link-url').value;
            if (url) {
                execCmdWithArg('createLink', url);
            }
            closeModal('link-modal');
            document.getElementById('link-url').value = '';
        }
        
        function insertImage() {
            document.getElementById('image-modal').classList.add('active');
            document.getElementById('image-url').focus();
        }
        
        function confirmImage() {
            const url = document.getElementById('image-url').value;
            if (url) {
                execCmdWithArg('insertImage', url);
            }
            closeModal('image-modal');
            document.getElementById('image-url').value = '';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
            setTimeout(() => {
                document.getElementById('status').textContent = '就绪';
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    saveFile();
                } else if (e.key === 'n') {
                    e.preventDefault();
                    newFile();
                } else if (e.key === 'o') {
                    e.preventDefault();
                    document.getElementById('file-input').click();
                }
            }
        });
        
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
        
        document.getElementById('link-url').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmLink();
        });
        
        document.getElementById('image-url').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmImage();
        });
        
        window.onload = initIframe;
    </script>
</body>
</html>
